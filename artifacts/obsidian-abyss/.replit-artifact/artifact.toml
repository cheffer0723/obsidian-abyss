kind = "web"
previewPath = "/"
title = "Obsidian Abyss"
version = "1.0.0"
id = "artifacts/obsidian-abyss"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19846

[services.development]
run = "pnpm --filter @workspace/obsidian-abyss run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/obsidian-abyss", "run", "build" ]
publicDir = "artifacts/obsidian-abyss/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19846"
BASE_PATH = "/"
